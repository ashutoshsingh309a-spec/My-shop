<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Shopping Store</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
    }
    header {
      background: #111827;
      color: #fff;
      padding: 15px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    header h1 {
      margin: 0;
      font-size: 22px;
    }
    nav a {
      color: #fff;
      margin-left: 15px;
      text-decoration: none;
      font-size: 14px;
    }
    .hero {
      background: linear-gradient(135deg, #6366f1, #9333ea);
      color: #fff;
      padding: 60px 20px;
      text-align: center;
    }
    .hero h2 {
      font-size: 36px;
      margin-bottom: 10px;
    }
    .hero p {
      font-size: 16px;
    }
    .products {
      padding: 40px 20px;
      max-width: 1200px;
      margin: auto;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
    }
    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.08);
      padding: 20px;
      text-align: center;
    }
    .card img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      border-radius: 10px;
    }
    .card h3 {
      margin: 15px 0 5px;
      font-size: 18px;
    }
    .card p {
      font-size: 14px;
      color: #555;
    }
    .price {
      font-size: 18px;
      font-weight: bold;
      margin: 10px 0;
    }
    button {
      background: #4f46e5;
      color: #fff;
      border: none;
      padding: 10px 18px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
    }
    button:hover {
      background: #4338ca;
    }
    footer {
      background: #111827;
      color: #fff;
      text-align: center;
      padding: 15px;
      margin-top: 40px;
      font-size: 14px;
    }
  </style>
</head>
<body>  <header>
    <h1>MyShop</h1>
    <nav>
      <a href="#">Home</a>
      <a href="#products">Products</a>
      <a href="#">Cart</a>
      <a href="#">Contact</a>
    </nav>
  </header>  <section class="hero">
    <h2>Welcome to MyShop</h2>
    <p>Best products at the best price</p>
  </section>  <section id="products" class="products">
    <div class="card">
      <img src="https://via.placeholder.com/300x200" alt="Product 1" />
      <h3>Product One</h3>
      <p>High quality product for daily use.</p>
      <div class="price">₹999</div>
      <button>Add to Cart</button>
    </div><div class="card">
  <img src="https://via.placeholder.com/300x200" alt="Product 2" />
  <h3>Product Two</h3>
  <p>Best seller item with premium quality.</p>
  <div class="price">₹1,499</div>
  <button>Add to Cart</button>
</div>

<div class="card">
  <img src="https://via.placeholder.com/300x200" alt="Product 3" />
  <h3>Product Three</h3>
  <p>Affordable and reliable product.</p>
  <div class="price">₹699</div>
  <button>Add to Cart</button>
</div>

  </section>  <footer>
    © 2026 MyShop. All rights reserved.
  </footer></body>
</html>
